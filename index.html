<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>冰箱進貨助手</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background: #00B900; color: white; margin-top: 15px; font-size: 1.1rem; }
        .btn-outline { background: #fff; color: #00B900; border: 1.5px solid #00B900; font-size: 0.9rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .loading-text { color: #888; font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>

    <div id="scanner-view">
        <div class="card">
            <h4>📷 掃描商品條碼</h4>
            <div id="reader"></div>
        </div>
        <button class="btn btn-outline" onclick="onScanSuccess('手動輸入項目')">直接手動輸入</button>
    </div>

    <div id="result-view" class="card hidden">
        <h3 style="margin-top:0;">確認進貨資訊</h3>
        
        <label>📦 品名：</label>
        <input type="text" id="product-name" placeholder="正在查詢品名...">
        <p id="scanned-barcode" style="color:#888; font-size:0.8rem; margin: -5px 0 10px 0;"></p>
        
        <label>📅 有效日期：</label>
        <input type="text" id="exp-date-picker" placeholder="選擇日期">
        
        <div class="grid-3">
            <button class="btn btn-outline" onclick="addDays(1)">+1天</button>
            <button class="btn btn-outline" onclick="addDays(3)">+3天</button>
            <button class="btn btn-outline" onclick="addDays(7)">+7天</button>
            <button class="btn btn-outline" onclick="addMonths(1)">+1月</button>
            <button class="btn btn-outline" onclick="addMonths(6)">+半年</button>
            <button class="btn btn-outline" onclick="addYears(1)">+1年</button>
        </div>

        <button class="btn btn-primary" onclick="sendData()">確認並匯入</button>
        <button class="btn btn-outline" style="margin-top:10px; border-color:#ccc; color:#999;" onclick="location.reload()">取消/重新掃描</button>
    </div>

    <script>
        let html5QrCode;
        let datePicker;

        async function init() {
            await liff.init({ liffId: "2009559112-ixFyyvpu" });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            datePicker = flatpickr("#exp-date-picker", {
                locale: "zh_tw", dateFormat: "Y/m/d", defaultDate: "today", disableMobile: "true"
            });
            startScan();
        }

        function startScan() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, onScanSuccess);
        }

        async function onScanSuccess(decodedText) {
            if (html5QrCode) await html5QrCode.stop();
            document.getElementById('scanner-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('scanned-barcode').innerText = "條碼：" + decodedText;
            
            if (decodedText !== "手動輸入項目") {
                fetchProductName(decodedText);
            } else {
                document.getElementById('product-name').value = "";
                document.getElementById('product-name').focus();
            }
        }

        // 串接免費 API 查詢品名
        async function fetchProductName(barcode) {
    const nameInput = document.getElementById('product-name');
    nameInput.value = "正在查詢資料庫...";

    // 建立一個 3 秒自動斷線的控制項
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 3000);

    try {
        // 嘗試查詢 Open Food Facts
        const response = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`, {
            signal: controller.signal
        });
        const data = await response.json();
        clearTimeout(timeoutId);

        if (data.status === 1 && data.product) {
            // 優先找繁體中文名，再找通用名
            const productName = data.product.product_name_zh || data.product.product_name;
            nameInput.value = productName;
        } else {
            throw new Error("查無資料");
        }
    } catch (err) {
        clearTimeout(timeoutId);
        nameInput.value = "";
        nameInput.placeholder = "查無品名，請手動輸入";
        // 自動把焦點移到輸入框，方便使用者直接打字
        nameInput.focus();
        console.log("查詢結束或超時");
    }
}

        // 日期增減邏輯
        function addDays(days) {
            const d = datePicker.selectedDates[0] || new Date();
            d.setDate(d.getDate() + days);
            datePicker.setDate(d);
        }
        function addMonths(months) {
            const d = datePicker.selectedDates[0] || new Date();
            d.setMonth(d.getMonth() + months);
            datePicker.setDate(d);
        }
        function addYears(years) {
            const d = datePicker.selectedDates[0] || new Date();
            d.setFullYear(d.getFullYear() + years);
            datePicker.setDate(d);
        }

        async function sendData() {
            const name = document.getElementById('product-name').value || "未命名商品";
            const barcode = document.getElementById('scanned-barcode').innerText;
            const expDate = document.getElementById('exp-date-picker').value;
            
            await liff.sendMessages([{
                type: 'text',
                text: `進貨成功！\n品名：${name}\n${barcode}\n有效日期：${expDate}`
            }]);
            liff.closeWindow();
        }

        init();
    </script>
</body>
</html>
