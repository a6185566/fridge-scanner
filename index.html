<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>冰箱管家 Pro</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>

    <style>
        :root { --line-green: #00B900; --danger: #ff4d4d; --warning: #b8860b; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        
        /* 掃描器與輸入樣式 */
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--line-green); color: white; margin-top: 15px; font-size: 1.1rem; }
        .btn-outline { background: #fff; color: var(--line-green); border: 1.5px solid var(--line-green); font-size: 0.9rem; margin-top: 5px; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
        
        /* 數量控制 */
        .count-ctrl { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .count-btn { width: 45px; height: 45px; border: 1px solid #ddd; background: white; border-radius: 8px; font-size: 1.2rem; }

        /* 儀表板樣式 */
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
        .stat-box { text-align: center; padding: 10px; border-radius: 10px; background: #fff; border: 1px solid #eee; }
        .stat-count { font-size: 1.4rem; font-weight: bold; display: block; }
        .red { color: var(--danger); font-weight: bold; }
        .yellow { color: var(--warning); font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* 導覽列 */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #ddd; z-index: 100; }
        .nav-item { text-align: center; padding: 15px 0; color: #666; font-size: 0.85rem; cursor: pointer; }
        .nav-active { color: var(--line-green); font-weight: bold; background: #f9f9f9; }
    </style>
</head>
<body>

    <div id="view-dashboard">
        <div class="card">
            <h3 style="margin:0 0 15px 0;">📊 冰箱庫存</h3>
            <div class="grid-3">
                <div class="stat-box">
                    <span id="count-expired" class="stat-count red">0</span>
                    <span style="font-size: 0.7rem;">已過期</span>
                </div>
                <div class="stat-box">
                    <span id="count-warning" class="stat-count yellow">0</span>
                    <span style="font-size: 0.7rem;">快過期</span>
                </div>
                <div class="stat-box">
                    <span id="count-all" class="stat-count">0</span>
                    <span style="font-size: 0.7rem;">總品項</span>
                </div>
            </div>
        </div>
        <div class="card">
            <h4 style="margin:0 0 10px 0;">📋 目前庫存 (依效期排序)</h4>
            <div id="dash-list-content">載入中...</div>
        </div>
    </div>

    <div id="view-scan" class="hidden">
        <div id="scanner-view">
            <div class="card">
                <h4>📷 掃描商品條碼</h4>
                <div id="reader"></div>
            </div>
            <button class="btn btn-outline" onclick="onScanSuccess('手動輸入項目')">直接手動輸入</button>
        </div>

        <div id="result-view" class="card hidden">
            <h3 style="margin-top:0;">確認進貨資訊</h3>
            <label>📦 品名：</label>
            <input type="text" id="product-name" placeholder="請輸入品名">
            <p id="scanned-barcode" style="color:#888; font-size:0.8rem; margin: -5px 0 10px 0;"></p>
            
            <label>🔢 數量：</label>
            <div class="count-ctrl">
                <button class="count-btn" onclick="adjustCount(-1)">-</button>
                <input type="number" id="product-count" value="1" style="text-align:center; flex:1;">
                <button class="count-btn" onclick="adjustCount(1)">+</button>
            </div>

            <label>📅 有效日期：</label>
            <input type="text" id="exp-date-picker">
            
            <div class="grid-3">
                <button class="btn btn-outline" onclick="changeDate(1, 'day')">+1天</button>
                <button class="btn btn-outline" onclick="changeDate(7, 'day')">+7天</button>
                <button class="btn btn-outline" onclick="changeDate(1, 'month')">+1月</button>
                <button class="btn btn-outline" onclick="changeDate(-1, 'day')">-1天</button>
                <button class="btn btn-outline" onclick="changeDate(-7, 'day')">-7天</button>
                <button class="btn btn-outline" onclick="changeDate(-1, 'month')">-1月</button>
            </div>
            <button class="btn btn-primary" onclick="sendData()">確認並匯入</button>
            <button class="btn btn-outline" style="border-color:#ccc; color:#999;" onclick="resetScanner()">取消/重新掃描</button>
        </div>
    </div>

    <div id="view-manage" class="hidden">
        <div class="card">
            <h3>🍴 吃完了/管理</h3>
            <input type="text" id="search-input" placeholder="🔍 輸入品名篩選..." oninput="filterItems()">
            <div id="manage-list-content">載入中...</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item nav-active" id="nav-dash" onclick="switchPage('dashboard')">查清單</div>
        <div class="nav-item" id="nav-scan" onclick="switchPage('scan')">掃描進貨</div>
        <div class="nav-item" id="nav-manage" onclick="switchPage('manage')">吃完了</div>
    </div>

<script>
    // ⚠️ 請確認這是您最新部署的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwUKcO1S7VAm9SnrxajhpibVcXsigENBerj7gd10nVh6dGV0hjTwmswTgRV8HnNYI_J/exec";
    let html5QrCode;
    let datePicker;
    let allItems = [];

    async function init() {
        await liff.init({ liffId: "2009559112-ixFyyvpu" });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        datePicker = flatpickr("#exp-date-picker", {
            locale: "zh_tw", dateFormat: "Y/m/d", defaultDate: "today", disableMobile: "true"
        });

        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page') || 'dashboard';
        switchPage(page);
    }

    function switchPage(page) {
        document.getElementById('view-dashboard').classList.add('hidden');
        document.getElementById('view-scan').classList.add('hidden');
        document.getElementById('view-manage').classList.add('hidden');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-active'));

        if (page === 'dashboard') {
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('nav-dash').classList.add('nav-active');
            fetchData();
            stopScan();
        } else if (page === 'scan') {
            document.getElementById('view-scan').classList.remove('hidden');
            document.getElementById('nav-scan').classList.add('nav-active');
            startScan();
        } else if (page === 'manage') {
            document.getElementById('view-manage').classList.remove('hidden');
            document.getElementById('nav-manage').classList.add('nav-active');
            fetchData();
            stopScan();
        }
    }

    // --- 掃描與條碼查詢 ---
    function startScan() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, onScanSuccess);
    }
    async function stopScan() { if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop(); }

    async function onScanSuccess(decodedText) {
        await stopScan();
        document.getElementById('scanner-view').classList.add('hidden');
        document.getElementById('result-view').classList.remove('hidden');
        document.getElementById('scanned-barcode').innerText = "條碼：" + decodedText;
        document.getElementById('product-count').value = 1;
        
        if (decodedText !== "手動輸入項目") {
            fetchProductName(decodedText);
        } else {
            document.getElementById('product-name').value = "";
            document.getElementById('product-name').focus();
        }
    }

    async function fetchProductName(barcode) {
        const nameInput = document.getElementById('product-name');
        nameInput.value = "正在搜尋私人庫...";

        try {
            // 優先查 GAS 私人庫
            const gasRes = await fetch(`${GAS_URL}?action=search&barcode=${barcode}&t=${Date.now()}`);
            const gasData = await gasRes.json();

            if (gasData.success && gasData.name) {
                nameInput.value = gasData.name;
            } else {
                // 私人庫沒中，查 Open Food Facts
                nameInput.value = "搜尋外部庫...";
                const offRes = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
                const offData = await offRes.json();
                if (offData.status === 1) {
                    nameInput.value = offData.product.product_name_zh || offData.product.product_name;
                } else {
                    nameInput.value = "";
                    nameInput.placeholder = "查無品名，請手動輸入";
                    nameInput.focus();
                }
            }
        } catch (err) {
            nameInput.value = "";
            nameInput.focus();
        }
    }

    // --- 數據處理 ---
    async function fetchData() {
        try {
            const res = await fetch(`${GAS_URL}?action=getInventory&t=${Date.now()}`);
            allItems = await res.json();
            renderDashboard();
            renderManageList(allItems);
        } catch(e) { console.error("載入失敗"); }
    }

    function renderDashboard() {
        const now = new Date().setHours(0,0,0,0);
        const warningLimit = new Date();
        warningLimit.setDate(new Date().getDate() + 3);
        
        let expired = 0, warning = 0;
        let html = '<table style="width:100%; border-collapse:collapse;">';
        
        allItems.sort((a,b) => new Date(a.expDate) - new Date(b.expDate));

        allItems.forEach(item => {
            const exp = new Date(item.expDate);
            let style = "";
            if (exp < now) { expired++; style = "red"; }
            else if (exp <= warningLimit) { warning++; style = "yellow"; }
            
            html += `<tr style="border-bottom:1px solid #eee;">
                <td style="padding:10px 0;">${item.name} <small style="color:blue">x${item.count}</small><br><small style="color:#888">入庫:${item.addDate}</small></td>
                <td style="text-align:right;" class="${style}">${item.expDate}</td>
            </tr>`;
        });
        
        document.getElementById('count-expired').innerText = expired;
        document.getElementById('count-warning').innerText = warning;
        document.getElementById('count-all').innerText = allItems.length;
        document.getElementById('dash-list-content').innerHTML = html + '</table>';
    }

    function renderManageList(items) {
        let html = "";
        items.forEach(item => {
            html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #eee;">
                <div><b>${item.name}</b> <span style="color:blue">x${item.count}</span><br><small>效期：${item.expDate}</small></div>
                <div style="display:flex; gap:5px;">
                    <button class="btn-del" style="background:#ff9800" onclick="deleteItem(${item.id}, 'minus')">吃1個</button>
                    <button class="btn-del" onclick="deleteItem(${item.id}, 'all')">全移除</button>
                </div>
            </div>`;
        });
        document.getElementById('manage-list-content').innerHTML = html || "找不到品項";
    }

    // --- 刪除與過濾 ---
    async function deleteItem(rowId, mode) {
        const msg = mode === 'all' ? "確定全部移除？" : "吃掉一個？";
        if (!confirm(msg)) return;
        await fetch(`${GAS_URL}?action=delete&row=${rowId}&mode=${mode}`);
        fetchData();
    }

    function filterItems() {
        const key = document.getElementById('search-input').value.toLowerCase();
        const filtered = allItems.filter(i => i.name.toLowerCase().includes(key));
        renderManageList(filtered);
    }

    // --- 輔助工具 ---
    function adjustCount(val) {
        const input = document.getElementById('product-count');
        let current = parseInt(input.value) || 1;
        input.value = (current + val < 1) ? 1 : current + val;
    }

    function changeDate(val, unit) {
        const d = datePicker.selectedDates[0] || new Date();
        if (unit === 'day') d.setDate(d.getDate() + val);
        else if (unit === 'month') d.setMonth(d.getMonth() + val);
        datePicker.setDate(d);
    }

    function resetScanner() { location.reload(); }

    async function sendData() {
        const name = document.getElementById('product-name').value || "未命名商品";
        const count = document.getElementById('product-count').value || "1";
        const barcode = document.getElementById('scanned-barcode').innerText;
        const expDate = document.getElementById('exp-date-picker').value;
        
        // 發送給 LINE Bot (會觸發 doPost 寫入 Sheet)
        await liff.sendMessages([{ 
            type: 'text', 
            text: `進貨成功！\n品名：${name}\n數量：${count}\n${barcode}\n有效日期：${expDate}` 
        }]);
        liff.closeWindow();
    }

    init();
</script>
</body>
</html>
