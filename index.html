<div id="result-view" class="card hidden">
    <h3>確認進貨資訊</h3>
    <label>📦 品名：</label>
    <input type="text" id="product-name">
    
    <label>🔢 數量：</label>
    <div style="display:flex; align-items:center; gap:10px;">
        <button class="btn btn-outline" style="width:50px" onclick="changeCount(-1)">-</button>
        <input type="number" id="product-count" value="1" style="text-align:center; margin:0">
        <button class="btn btn-outline" style="width:50px" onclick="changeCount(1)">+</button>
    </div>

    <label>📅 有效日期：</label>
    <input type="text" id="exp-date-picker">
    
    <div class="grid-3">
        <button class="btn btn-outline" onclick="adjustDate(1, 'day')">+1天</button>
        <button class="btn btn-outline" onclick="adjustDate(7, 'day')">+7天</button>
        <button class="btn btn-outline" onclick="adjustDate(1, 'month')">+1月</button>
        <button class="btn btn-outline" onclick="adjustDate(-1, 'day')">-1天</button>
        <button class="btn btn-outline" onclick="adjustDate(-7, 'day')">-7天</button>
        <button class="btn btn-outline" onclick="adjustDate(-1, 'month')">-1月</button>
    </div>
    <button class="btn btn-primary" onclick="sendData()">確認並匯入</button>
</div>

<script>
// 修改後的管理列表呈現
function renderManageList(items) {
    let html = "";
    items.forEach(item => {
        html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #eee;">
            <div>
                <b>${item.name}</b> <span style="color:blue">x${item.count}</span><br>
                <small>效期：${item.expDate}</small>
            </div>
            <div style="display:flex; gap:5px;">
                <button class="btn-del" style="background:#ff9800" onclick="deleteItem(${item.id}, 'minus')">吃1個</button>
                <button class="btn-del" onclick="deleteItem(${item.id}, 'all')">全移除</button>
            </div>
        </div>`;
    });
    document.getElementById('manage-list-content').innerHTML = html;
}

// 4. 修正後的搜尋品名邏輯
async function fetchProductName(barcode) {
    const nameInput = document.getElementById('product-name');
    nameInput.value = "正在搜尋私人庫...";
    
    try {
        // 加上 timestamp 防止瀏覽器快取舊資料
        const res = await fetch(`${GAS_URL}?action=search&barcode=${barcode}&t=${Date.now()}`);
        const data = await res.json();
        
        if (data.success) {
            nameInput.value = data.name;
        } else {
            // 私人庫沒有，查外部
            nameInput.value = "查詢外部資料...";
            const offRes = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
            const offData = await offRes.json();
            nameInput.value = (offData.status === 1) ? (offData.product.product_name_zh || offData.product.product_name) : "";
        }
    } catch (e) {
        nameInput.value = "";
    }
}

// 數量增減
function changeCount(val) {
    const input = document.getElementById('product-count');
    let res = parseInt(input.value) + val;
    input.value = res < 1 ? 1 : res;
}

// 統一日期調整
function adjustDate(val, unit) {
    const d = datePicker.selectedDates[0] || new Date();
    if (unit === 'day') d.setDate(d.getDate() + val);
    if (unit === 'month') d.setMonth(d.getMonth() + val);
    datePicker.setDate(d);
}

// 修改發送訊息格式
async function sendData() {
    const name = document.getElementById('product-name').value;
    const count = document.getElementById('product-count').value;
    const barcode = document.getElementById('scanned-barcode').innerText;
    const expDate = document.getElementById('exp-date-picker').value;
    
    await liff.sendMessages([{
        type: 'text',
        text: `進貨成功！\n品名：${name}\n數量：${count}\n${barcode}\n有效日期：${expDate}`
    }]);
    liff.closeWindow();
}

async function deleteItem(rowId, mode) {
    if(!confirm(mode === 'all' ? "確定移除全部？" : "吃掉一個？")) return;
    await fetch(`${GAS_URL}?action=delete&row=${rowId}&mode=${mode}`);
    fetchData();
}
</script>
