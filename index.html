<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>冰箱進貨 (條碼版)</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { text-align: center; font-family: -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        #scanner-container { width: 100%; max-width: 500px; margin: 20px auto; position: relative; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { padding: 18px; width: 85%; font-size: 1.2rem; background: #00B900; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #status-msg { margin: 20px; padding: 15px; font-size: 0.9rem; color: #666; background: #eee; border-radius: 10px; }
        /* 樣式化掃描框 (Html5-QRCode 自帶樣式) */
        #reader__scan_region video { object-fit: cover !important; }
    </style>
</head>
<body>
    <h3 style="margin-top: 30px;">🛒 冰箱條碼掃描器</h3>
    
    <div id="scanner-container">
        <div id="reader"></div>
    </div>

    <button class="btn" id="start-btn" disabled>正在初始化...</button>
    <div id="status-msg">正在啟動 LINE 環境...</div>

    <script>
    const statusMsg = document.getElementById('status-msg');
    const startBtn = document.getElementById('start-btn');
    const liffId = "2009559112-ixFyyvpu";
    let html5QrCode;

    // 1. 初始化入口
    async function main() {
        try {
            statusMsg.innerText = "正在連線至 LINE...";
            
            // 初始化 LIFF
            await liff.init({ liffId: liffId });

            // 檢查登入
            if (!liff.isLoggedIn()) {
                statusMsg.innerText = "驗證身份中，請稍候...";
                liff.login();
                return;
            }

            // 確保環境完全就緒
            liff.ready.then(() => {
                statusMsg.innerText = "✅ 連結成功！請點擊按鈕掃描";
                statusMsg.style.background = "#d4edda";
                statusMsg.style.color = "#155724";
                startBtn.innerText = "開始掃描商品";
                startBtn.disabled = false;
                startBtn.onclick = startScanning;
            });

        } catch (err) {
            statusMsg.innerText = "❌ 初始化失敗: " + err.message;
            console.error(err);
        }
    }

    // 2. 啟動掃描
    async function startScanning() {
        try {
            startBtn.disabled = true;
            statusMsg.innerText = "正在喚醒相機...";

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const config = {
                fps: 10,
                qrbox: { width: 280, height: 150 },
                aspectRatio: 1.777778
            };

            await html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess
            );
            
            statusMsg.innerText = "🔍 掃描中，請將條碼對準框框";
        } catch (err) {
            alert("無法開啟相機，請確認已授權：\n" + err);
            startBtn.disabled = false;
            statusMsg.innerText = "❌ 相機啟動失敗";
        }
    }

    // 3. 掃描成功處理
    async function onScanSuccess(decodedText) {
        try {
            if (html5QrCode) await html5QrCode.stop();
            statusMsg.innerText = "⌛ 正在傳送資料: " + decodedText;

            // 傳送回 LINE 聊天室
            await liff.sendMessages([{
                type: 'text',
                text: '進貨掃描：' + decodedText
            }]);

            liff.closeWindow();
        } catch (err) {
            alert("傳送失敗: " + err.message);
            // 失敗後重新開啟按鈕讓使用者重試
            startBtn.disabled = false;
        }
    }

    // 啟動主程式
    main();
</script>
</body>
</html>
