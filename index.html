<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>冰箱管家 Pro</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>

    <style>
        :root { --line-green: #00B900; --danger: #ff4d4d; --warning: #b8860b; --soft-blue: #f0f7ff; }
        body { font-family: -apple-system, sans-serif; background: #fdfdfd; margin: 0; padding: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none; }
        
        /* 管理頁面清單優化 */
        .manage-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--soft-blue); gap: 10px; }
        .item-info { flex: 1; min-width: 0; } 
        .item-name { display: block; font-weight: 600; color: #333; font-size: 1rem; line-height: 1.3; word-break: break-all; }
        .item-sub { font-size: 0.75rem; color: #bbb; margin-top: 2px; }

        /* 數量控制區 */
        .qty-group-mini { 
            display: flex; 
            align-items: center; 
            border: 1.2px solid #eee; 
            border-radius: 20px; 
            padding: 0 4px; 
            background: #fff;
            width: 95px; 
            flex-shrink: 0; 
        }
        .qty-btn-mini { width: 28px; height: 32px; border: none; background: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: var(--line-green); outline: none; }
        .qty-input-mini { width: 30px; border: none; background: transparent; text-align: center; font-size: 0.95rem; font-weight: bold; color: #444; outline: none; }
        .qty-input-mini::-webkit-outer-spin-button, .qty-input-mini::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-trash-svg { 
            background: none; border: none; cursor: pointer; padding: 5px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .trash-icon { fill: none; stroke: #ccc; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: 0.2s; }
        .btn-trash-svg:active .trash-icon { stroke: var(--danger); transform: scale(0.9); }

        /* 其他元件樣式 */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--line-green); color: white; margin-top: 15px; font-size: 1.1rem; }
        .btn-outline { background: #fff; color: var(--line-green); border: 1.5px solid var(--line-green); font-size: 0.9rem; margin-top: 5px; }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 8px 0; }
        .stat-box { text-align: center; padding: 10px; border-radius: 12px; background: #fff; border: 1px solid #f0f0f0; }
        .stat-count { font-size: 1.4rem; font-weight: bold; display: block; }
        .red { color: var(--danger); }
        .yellow { color: var(--warning); }
        
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.95); display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #eee; z-index: 100; backdrop-filter: blur(10px); }
        .nav-item { text-align: center; padding: 15px 0; color: #aaa; font-size: 0.85rem; cursor: pointer; }
        .nav-active { color: var(--line-green); font-weight: bold; }
    </style>
</head>
<body>

    <div id="view-dashboard">
        <div class="card">
            <h3 style="margin:0 0 15px 0;">📊 冰箱庫存</h3>
            <div class="grid-3">
                <div class="stat-box">
                    <span id="count-expired" class="stat-count red">0</span>
                    <span style="font-size: 0.7rem; color: #888;">已過期</span>
                </div>
                <div class="stat-box">
                    <span id="count-warning" class="stat-count yellow">0</span>
                    <span style="font-size: 0.7rem; color: #888;">快過期</span>
                </div>
                <div class="stat-box">
                    <span id="count-all" class="stat-count">0</span>
                    <span style="font-size: 0.7rem; color: #888;">總品項</span>
                </div>
            </div>
        </div>
        <div class="card">
            <h4 style="margin:0 0 12px 0; color: #444;">📋 庫存清單</h4>
            <div id="dash-list-content" style="font-size: 0.95rem;">載入中...</div>
        </div>
    </div>

    <div id="view-scan" class="hidden">
        <div id="scanner-view">
            <div class="card">
                <h4>📷 掃描條碼</h4>
                <div id="reader"></div>
            </div>
            <button class="btn btn-outline" onclick="onScanSuccess('手動輸入項目')">直接手動輸入</button>
        </div>

        <div id="result-view" class="card hidden">
            <h3 style="margin-top:0;">確認進貨</h3>
            <label style="font-size: 0.9rem; color: #666;">📦 品名</label>
            <input type="text" id="product-name" placeholder="請輸入品名">
            <p id="scanned-barcode" style="color:#bbb; font-size:0.75rem; margin: -5px 0 10px 0;"></p>
            
            <label style="font-size: 0.9rem; color: #666;">🔢 數量</label>
            <input type="number" id="product-count" value="1" style="text-align:center;">

            <label style="font-size: 0.9rem; color: #666;">📅 有效日期</label>
            <input type="text" id="exp-date-picker">
            
            <div class="grid-3">
                <button class="btn btn-outline" onclick="changeDate(1, 'day')">+1天</button>
                <button class="btn btn-outline" onclick="changeDate(7, 'day')">+7天</button>
                <button class="btn btn-outline" onclick="changeDate(1, 'month')">+1月</button>
            </div>
            <div class="grid-3" style="margin-top: -5px;">
                <button class="btn btn-outline" style="color:#999; border-color:#eee" onclick="changeDate(-1, 'day')">-1天</button>
                <button class="btn btn-outline" style="color:#999; border-color:#eee" onclick="changeDate(-7, 'day')">-7天</button>
                <button class="btn btn-outline" style="color:#999; border-color:#eee" onclick="changeDate(-1, 'month')">-1月</button>
            </div>
            <button class="btn btn-primary" onclick="sendData()">確認匯入</button>
            <button class="btn btn-outline" style="border-color:#eee; color:#ccc;" onclick="resetScanner()">取消重掃</button>
        </div>
    </div>

    <div id="view-manage" class="hidden">
        <div class="card">
            <h3>🍴 庫存管理</h3>
            <input type="text" id="search-input" placeholder="🔍 搜尋冰箱裡的食物..." oninput="filterItems()">
            <div id="manage-list-content">載入中...</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item nav-active" id="nav-dash" onclick="switchPage('dashboard')">查清單</div>
        <div class="nav-item" id="nav-scan" onclick="switchPage('scan')">掃描進貨</div>
        <div class="nav-item" id="nav-manage" onclick="switchPage('manage')">吃完了</div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwUKcO1S7VAm9SnrxajhpibVcXsigENBerj7gd10nVh6dGV0hjTwmswTgRV8HnNYI_J/exec";
    let html5QrCode;
    let datePicker;
    let allItems = [];

    async function init() {
        await liff.init({ liffId: "2009559112-ixFyyvpu" });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        datePicker = flatpickr("#exp-date-picker", {
            locale: "zh_tw", dateFormat: "Y/m/d", defaultDate: "today", disableMobile: "true"
        });

        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page') || 'dashboard';
        switchPage(page);
    }

    function switchPage(page) {
        document.getElementById('view-dashboard').classList.add('hidden');
        document.getElementById('view-scan').classList.add('hidden');
        document.getElementById('view-manage').classList.add('hidden');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-active'));

        if (page === 'dashboard') {
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('nav-dash').classList.add('nav-active');
            fetchData();
            stopScan();
        } else if (page === 'scan') {
            document.getElementById('view-scan').classList.remove('hidden');
            document.getElementById('nav-scan').classList.add('nav-active');
            startScan();
        } else if (page === 'manage') {
            document.getElementById('view-manage').classList.remove('hidden');
            document.getElementById('nav-manage').classList.add('nav-active');
            fetchData();
            stopScan();
        }
    }

    function startScan() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, onScanSuccess);
    }
    async function stopScan() { if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop(); }

    async function onScanSuccess(decodedText) {
        await stopScan();
        document.getElementById('scanner-view').classList.add('hidden');
        document.getElementById('result-view').classList.remove('hidden');
        document.getElementById('scanned-barcode').innerText = "條碼：" + decodedText;
        
        if (decodedText !== "手動輸入項目") {
            fetchProductName(barcode);
        } else {
            document.getElementById('product-name').value = "";
            document.getElementById('product-name').focus();
        }
    }

    async function fetchProductName(barcode) {
        const nameInput = document.getElementById('product-name');
        nameInput.value = "搜尋中...";
        try {
            const gasRes = await fetch(`${GAS_URL}?action=search&barcode=${barcode}&t=${Date.now()}`);
            const gasData = await gasRes.json();
            if (gasData.success) {
                nameInput.value = gasData.name;
            } else {
                const offRes = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
                const offData = await offRes.json();
                nameInput.value = (offData.status === 1) ? (offData.product.product_name_zh || offData.product.product_name) : "";
            }
        } catch (err) { nameInput.value = ""; }
    }

    async function fetchData() {
        try {
            const res = await fetch(`${GAS_URL}?action=getInventory&t=${Date.now()}`);
            allItems = await res.json();
            renderDashboard();
            renderManageList(allItems);
        } catch(e) { console.error("載入失敗"); }
    }

    function renderDashboard() {
        const now = new Date().setHours(0,0,0,0);
        const warningLimit = new Date();
        warningLimit.setDate(new Date().getDate() + 3);
        
        let expired = 0, warning = 0;
        let html = '<table style="width:100%; border-collapse:collapse;">';
        allItems.sort((a,b) => new Date(a.expDate) - new Date(b.expDate));

        allItems.forEach(item => {
            const exp = new Date(item.expDate);
            let style = "";
            if (exp < now) { expired++; style = "red"; }
            else if (exp <= warningLimit) { warning++; style = "yellow"; }
            
            html += `<tr style="border-bottom:1px solid #f9f9f9;">
                <td style="padding:12px 0;">${item.name} <small style="color:var(--line-green); font-weight:bold;">x${item.count}</small></td>
                <td style="text-align:right; font-size:0.85rem;" class="${style}">${item.expDate}</td>
            </tr>`;
        });
        
        document.getElementById('count-expired').innerText = expired;
        document.getElementById('count-warning').innerText = warning;
        document.getElementById('count-all').innerText = allItems.length;
        document.getElementById('dash-list-content').innerHTML = html + '</table>';
    }

    function renderManageList(items) {
        let html = "";
        items.forEach(item => {
            html += `
            <div class="manage-item">
                <div class="item-info">
                    <span class="item-name">${item.name}</span>
                    <span class="item-sub">效期：${item.expDate}</span>
                </div>
                <div class="qty-group-mini">
                    <button class="qty-btn-mini" onclick="changeQtyBtn(${item.id}, -1)">−</button>
                    <input type="number" id="input-${item.id}" class="qty-input-mini" value="${item.count}" 
                           onchange="syncQty(${item.id}, this.value)">
                    <button class="qty-btn-mini" onclick="changeQtyBtn(${item.id}, 1)">+</button>
                </div>
                <button class="btn-trash-svg" onclick="deleteItem(${item.id})">
                    <svg class="trash-icon" width="22" height="22" viewBox="0 0 24 24">
                        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>
                    </svg>
                </button>
            </div>`;
        });
        document.getElementById('manage-list-content').innerHTML = html || "冰箱空空的喔！";
    }

    // 核心偵錯點：不要從 onclick 傳入固定的 count，而是從 Input 讀取當下數值
    async function changeQtyBtn(id, delta) {
        const input = document.getElementById(`input-${id}`);
        let currentQty = parseInt(input.value) || 0;
        const newQty = Math.max(0, currentQty + delta);
        
        // 1. 立即更新 UI
        input.value = newQty;
        
        // 2. 同步到 Google Sheets
        await syncQty(id, newQty);
    }

    async function syncQty(id, val) {
        try {
            // mode=set 配合 val 參數直接在 GAS 更新該行數值
            const response = await fetch(`${GAS_URL}?action=updateQty&row=${id}&mode=set&val=${val}&t=${Date.now()}`);
            const result = await response.json();
            if (result.success && val === 0) {
                // 如果數量減到 0，重新拉取清單（因為該行已被刪除）
                fetchData();
            }
        } catch(e) { 
            console.error("同步失敗", e); 
            alert("更新失敗，請檢查網路");
        }
    }

    async function deleteItem(id) {
        if (!confirm("確定全部移除此品項？")) return;
        try {
            await fetch(`${GAS_URL}?action=delete&row=${id}&t=${Date.now()}`);
            fetchData();
        } catch(e) { alert("刪除失敗"); }
    }

    function filterItems() {
        const key = document.getElementById('search-input').value.toLowerCase();
        const filtered = allItems.filter(i => i.name.toLowerCase().includes(key));
        renderManageList(filtered);
    }

    function changeDate(val, unit) {
        const d = datePicker.selectedDates[0] || new Date();
        if (unit === 'day') d.setDate(d.getDate() + val);
        else if (unit === 'month') d.setMonth(d.getMonth() + val);
        datePicker.setDate(d);
    }

    function resetScanner() { location.reload(); }

    async function sendData() {
        const name = document.getElementById('product-name').value || "未命名商品";
        const count = document.getElementById('product-count').value || "1";
        const barcode = document.getElementById('scanned-barcode').innerText;
        const expDate = document.getElementById('exp-date-picker').value;
        
        await liff.sendMessages([{ 
            type: 'text', 
            text: `進貨成功！\n品名：${name}\n數量：${count}\n${barcode}\n有效日期：${expDate}` 
        }]);
        liff.closeWindow();
    }

    init();
</script>
</body>
</html>
